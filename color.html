
<html>
    <head>
        <title>New web page</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, sans-serif;
                background-image: url("https://images.pexels.com/photos/147411/italy-mountains-dawn-daybreak-147411.jpeg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .container {
                background: white;
                background-image: url("https://i.pinimg.com/736x/06/23/59/06235955289394a0b588c68399e8dcca.jpg"),url("https://i.pinimg.com/736x/d8/5e/6d/d85e6dd8af8613d1682a80a4857c9ff3.jpg");
                background-position: right bottom, left top;
                background-size: 100px;
                background-repeat: no-repeat;
                width: 320px;
                padding: 50px;
                text-align: center;
                border-radius: 25px;
                box-shadow: 3px 5px 5px red;
            }
            .container h2 {
                margin-bottom: 25px;
                text-shadow: 2px 2px rgb(196, 199, 21);
                color: rgb(6, 121, 136);
            }

            .container img{
                width: 100%;
                border-radius: 15px;
                margin-bottom: 15px;
                box-shadow: 0 8px 15px rgb(15, 174, 63);
            }

            .container p{
                font-size: 14px;
                color: #130606;
                margin-bottom: 20px;
            }
            .container button {
                padding: 10px 20px;
                border: none;
                border-radius: 25px;
                background: rgb(20, 150, 170);
                color: rgb(228, 235, 225);
                font-size: 14px;
                cursor: pointer;
                box-shadow: 5px 5px rgb(234, 23, 220);
            }
        </style>
    </head>

    <body>
        <div class = "container">
            <h2>Nature</h2>
            <img src = "https://images.pexels.com/photos/346529/pexels-photo-346529.jpeg">
<p><i><b>"I love spending time in nature," "Nature is beautiful," and "Nature gives us clean air to breathe."</b></i></p>
<button>Read More</button>
        </div>
    </body>
</html>
